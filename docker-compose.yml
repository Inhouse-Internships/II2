version: '3'

services:
  mongodb:
    image: mongo
    container_name: ii2-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: .
    container_name: ii2-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/ii2db
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-supersecretkey123}
      - CORS_ORIGINS=http://localhost:5000,http://127.0.0.1:5000,https://inhouseinternship.mooo.com

volumes:
  mongodb_data:
